<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Author" content="Joseph Bowen" />
    <meta
      name="description"
      content="This website provides a tool for outdoor enthusiasts to locate national 
    parks and plans trips and activities to those parks."
    />
    <title>Razor's Edge Wilderness Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/css/styles.css" />
    <link rel="icon" href="/images/razorclaw.ico" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script type="module" src="/src/js/main.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  </head>
  <header id="header"></header>
  <body>
    <main>
      <h2 id="pageHeader">Razor's Home Page</h2>
      <p class="intro">
        At Razor's Edge Wilderness Guide, we love outdoor recreation. Our goal
        is to help you find the outdoor activities that you enjoy!
      </p>
      <div class="hero">
        <figure>
          <img
            src="/images/hero_2000x1333.avif"
            alt="A picture of people white-water rafting."
            srcset="
              /images/hero_1400x933.avif 1400w,
              /images/hero_1000x667.avif 1000w
            "
            sizes="(max-width: 600px) 100vw, 
        70vw"
          />
          <figcaption>
            With Razor's Edge, it's only a matter of time before you find
            yourself experiencing joy like this!
          </figcaption>
        </figure>
      </div>
      <h2 class="highlightDivider" id="highlightIntro">
        Today's Park Highlight
      </h2>
      <div class="highlight"></div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
