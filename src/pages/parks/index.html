<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Joseph Bowen">
    <meta name="description" content="Search the Nation Park Services Database for Parks by state, region, or activity.">
    <title>Razor's Edge Wilderness Guide | Parks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/css/styles.css" />
    <script type="module" src="/src/js/parks.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <div class="highlight"></div>

    <main>
      <div class="stateSearch">
        <label for="stateSearch">Search Parks by State or Territory</label>
        <select name="stateSearch" id="stateSearch"></select>
      </div>
      <div class="regionSearch">
        <label for="regionSearch">Search Parks by Region</label>
        <select name="regionSearch" id="regionSearch"></select>
      </div>
      <div class="activitySearch">
        <label for="activitySearch">Search Parks by Activity</label>
        <select name="activitySearch" id="activitySearch"></select>
      </div>
      <div class="searchNearMe">
        <p id="parksNearMe">Find Parks Near Me</p>
      </div>
      <div id="cardsContainer"></div>
      <div class="navBtns"></div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
